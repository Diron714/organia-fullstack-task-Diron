spring.application.name=organia-task-manager
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/organia_tasks_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:your-512-bit-secret-key-replace-in-production-minimum-64-chars-long}
jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY:900000}
jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY:604800000}

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# OTP
app.otp.expiry-minutes=10
app.otp.max-per-email-per-hour=3

# Cookie
app.cookie.secure=false
app.cookie.same-site=Lax

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
