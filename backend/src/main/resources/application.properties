spring.application.name=organia-task-manager
server.port=${PORT:8080}

# Database (Railway: set DB_URL, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/organia_tasks_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:your-512-bit-secret-key-replace-in-production-minimum-64-chars-long}
jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY:900000}
jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY:604800000}

# Mail (Gmail SMTP). Override MAIL_USERNAME / MAIL_PASSWORD via env or .env (recommended).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:youremail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# CORS & frontend links (comma-separated origins; override with FRONTEND_URL on Railway)
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,https://organia-fullstack-task-diron.vercel.app}
app.frontend.url=${FRONTEND_URL:https://organia-fullstack-task-diron.vercel.app}

# Multipart / uploads (avatars)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.max-size-mb=5
app.upload.allowed-types=image/jpeg,image/png,image/webp,image/gif
app.upload.avatar-dir=uploads/avatars

# OTP
app.otp.expiry-minutes=10
app.otp.max-per-email-per-hour=3

# Cookie (set COOKIE_SECURE=true and COOKIE_SAME_SITE=None on Railway for cross-site HTTPS)
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Scheduling pool (due reminders, weekly mail, recurring tasks)
spring.task.scheduling.pool.size=4
