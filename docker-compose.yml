version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: organia_tasks_db
      MYSQL_ROOT_PASSWORD: root
    ports: ["3306:3306"]
    volumes: [db_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      DB_URL: jdbc:mysql://db:3306/organia_tasks_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    ports: ["5173:80"]
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
